[[data]]
name = "Tools and Setups"

[[data.entries]]
name = "Auto CPU Frequency"
description = "Automatic CPU speed & power optimizer for Linux."
script = "../applications-setup/auto-cpufreq.sh"
task_list = "I SS"

[[data.entries]]
name = "Auto Mount Drive"
description = "Automate the process of mounting drives on system startup."
script = "../utils/auto-mount.sh"
task_list = "PFM"
multi_select = false

[[data.entries]]
name = "Bottles"
description = "Run Windows software and games on Linux with ease."
script = "../applications-setup/bottles-setup.sh"
task_list = "FI"

[[data.entries]]
name = "Gaming Dependencies"
description = "Install necessary gaming dependencies across various Linux distributions."
script = "../system-setup/gaming-setup.sh"
task_list = "I"

[[data.entries]]
name = "General GPU Drivers"
description = "Detect and install recommended GPU driver stacks."
script = "../system-setup/gpu-driver.sh"
task_list = "I"
multi_select = false

[[data.entries]]
name = "Nvidia Drivers & Hardware Acceleration"
description = "Arch-specific NVIDIA driver installer and hardware acceleration setup."
script = "../system-setup/arch/nvidia-drivers.sh"
task_list = "I"

[[data.entries]]
name = "Waydroid"
description = "Run Android applications and games in a container on Linux."
script = "../applications-setup/waydroid-setup.sh"
task_list = "I SS"
[[data.entries.preconditions]]
matches = true
data = { environment = "XDG_SESSION_TYPE" }
values = ["wayland", "Wayland"]
