name: XTask Checks

on:
  push:
    branches: [ main ]
    paths:
      - 'xtask/**'
      - 'core/tabs/**'
      - 'docs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'xtask/**'
      - 'core/tabs/**'
      - 'docs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  docgen:
    name: DocGen Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Generate Documentation
        run: cargo xtask docgen

      - name: Verify Documentation Status
        run: |
          if ! git diff --exit-code docs; then
            echo "::error::Documentation is out of date. Please run 'cargo xtask docgen' locally and commit the changes."
            exit 1
          fi
